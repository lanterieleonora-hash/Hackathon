<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Controllo USV/ROV FPV</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="container">
    <div id="view-container">
      <div id="camera-label">VISUALE: USV</div>
      <canvas id="view" width="800" height="450"></canvas>
      <div id="instructions">Frecce = Navigazione • SPAZIO = Cambio Visuale • L = Torcia</div>
    </div>
    <div id="telemetry">
      <h2>Telemetria <span id="target-name">USV</span></h2>
      <div class="data-box">Posizione: <span id="pos">(0,0,0)</span></div>
      <div class="data-box">Segnale: <span id="signal">-40</span> dB</div>
      <div class="data-box">Batteria: <span id="battery">100%</span></div>
      <div class="data-box">Profondità: <span id="depth">0</span> m</div>
      <div class="data-box">Link: <span id="link">OK</span></div>
      <div class="data-box">Stato: <span id="mode">NORMALE</span></div>
      <button id="emergencyBtn">EMERGENZA</button>
      <div id="emergencyPanel" class="hidden">
        <select id="emergencySelect">
            <option value="0">0-Normale</option>
            <option value="1">1-Attenzione</option>
            <option value="2">2-Perdita Link</option>
            <option value="3">3-Risalita</option>
            <option value="4">4-Rientro</option>
            <option value="5">5-Grave</option>
        </select>
        <button id="confirmEmergency">OK</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
